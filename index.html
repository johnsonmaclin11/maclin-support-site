<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VertexOps Global | Operations, Recruitment, Systems & Client Support</title>
  <meta name="description" content="VertexOps helps growth-focused businesses improve operational structure, hiring coordination, digital systems, planning, and client execution through professional support services built for scale." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#04111e;
      --bg2:#07182e;
      --panel:rgba(10,23,43,.86);
      --panel-2:rgba(14,28,50,.94);
      --line:rgba(125,176,255,.15);
      --text:#eef4ff;
      --muted:#a8bbd7;
      --blue:#4fa1ff;
      --cyan:#78e4ff;
      --green:#88f0c7;
      --shadow:0 24px 70px rgba(0,0,0,.34);
      --radius:28px;
      --max:1480px;
    }

    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      font-family:'Inter',system-ui,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 10% 8%, rgba(79,161,255,.15), transparent 20%),
        radial-gradient(circle at 90% 10%, rgba(120,228,255,.10), transparent 18%),
        linear-gradient(180deg,#03101c 0%,#071427 45%,#04111e 100%);
      overflow-x:hidden;
    }

    body::before,
    body::after{
      content:"";
      position:fixed;
      width:28vw;
      height:28vw;
      border-radius:50%;
      pointer-events:none;
      z-index:-1;
      filter:blur(80px);
      opacity:.28;
      animation:floatGlow 14s ease-in-out infinite alternate;
    }

    body::before{
      left:-8vw;
      top:-7vw;
      background:rgba(49,135,255,.22);
    }

    body::after{
      right:-9vw;
      top:22vh;
      background:rgba(92,230,255,.14);
      animation-duration:18s;
    }

    @keyframes floatGlow{
      from{transform:translate3d(0,0,0) scale(1)}
      to{transform:translate3d(3vw,2vh,0) scale(1.08)}
    }

    a{text-decoration:none;color:inherit}
    img{display:block;max-width:100%}
    button,input,select,textarea{font:inherit}

    .container{
      width:min(var(--max), calc(100% - 28px));
      margin:0 auto;
    }

    .topbar{
      border-bottom:1px solid rgba(117,177,255,.1);
      background:rgba(2,8,17,.84);
      backdrop-filter:blur(12px);
      overflow:hidden;
    }

    .ticker{
      display:flex;
      gap:30px;
      min-width:max-content;
      padding:12px 0;
      white-space:nowrap;
      color:#dbe8fb;
      animation:marquee 28s linear infinite;
    }

    .ticker span::before{
      content:"•";
      color:var(--cyan);
      margin-right:10px;
    }

    @keyframes marquee{
      from{transform:translateX(0)}
      to{transform:translateX(-50%)}
    }

    header{
      position:sticky;
      top:0;
      z-index:50;
      background:rgba(3,10,21,.74);
      border-bottom:1px solid rgba(112,168,255,.12);
      backdrop-filter:blur(14px);
    }

    .nav{
      min-height:90px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:18px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:14px;
      min-width:0;
    }

    .brand-logo-wrap{
      width:60px;
      height:60px;
      flex:0 0 auto;
      display:grid;
      place-items:center;
      border-radius:18px;
    }

    .brand-logo{
      width:58px;
      height:58px;
      object-fit:contain;
      filter:drop-shadow(0 0 16px rgba(87,194,255,.55)) drop-shadow(0 0 34px rgba(37,115,255,.30));
    }

    .brand-fallback{
      width:58px;
      height:58px;
      filter:drop-shadow(0 0 16px rgba(87,194,255,.55)) drop-shadow(0 0 34px rgba(37,115,255,.30));
      display:none;
    }

    .brand-text strong{
      display:block;
      font-size:1.9rem;
      line-height:1;
      letter-spacing:-.06em;
      background:linear-gradient(90deg,#73ddff 0%, #ffffff 42%, #62a8ff 100%);
      -webkit-background-clip:text;
      background-clip:text;
      color:transparent;
    }

    .brand-text small{
      display:block;
      margin-top:6px;
      color:#9db2ce;
      letter-spacing:.16em;
      text-transform:uppercase;
      font-size:.72rem;
    }

    .nav-links{
      display:flex;
      align-items:center;
      gap:24px;
      flex-wrap:wrap;
      color:#dce8fb;
    }

    .nav-links a{
      transition:.22s ease;
    }

    .nav-links a:hover{
      color:var(--cyan);
      transform:translateY(-1px);
      text-shadow:0 0 10px rgba(119,228,255,.4);
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:52px;
      padding:0 22px;
      border-radius:999px;
      border:1px solid rgba(110,173,255,.22);
      background:linear-gradient(90deg,#2f7fff 0%, #5dd6ff 100%);
      color:white;
      font-weight:800;
      letter-spacing:-.02em;
      box-shadow:0 14px 32px rgba(63,138,255,.28), 0 0 22px rgba(113,227,255,.10);
      transition:transform .22s ease, box-shadow .22s ease, filter .22s ease, background .22s ease;
      cursor:pointer;
    }

    .btn:hover{
      transform:translateY(-2px);
      box-shadow:0 18px 38px rgba(63,138,255,.34), 0 0 28px rgba(113,227,255,.22);
      filter:brightness(1.04);
    }

    .btn.secondary{
      background:rgba(255,255,255,.03);
      color:var(--text);
      box-shadow:none;
    }

    .btn.secondary:hover{
      background:rgba(79,161,255,.10);
    }

    .hero{
      padding:28px 0;
    }

    .hero-grid{
      display:grid;
      grid-template-columns:1.07fr .93fr;
      gap:20px;
      align-items:stretch;
    }

    .panel{
      background:linear-gradient(180deg, rgba(10,20,37,.95), rgba(5,12,24,.95));
      border:1px solid var(--line);
      border-radius:32px;
      box-shadow:var(--shadow);
      position:relative;
      overflow:hidden;
    }

    .hero-copy{
      padding:56px 48px 42px;
      background:
        radial-gradient(circle at top right, rgba(67,145,255,.16), transparent 30%),
        linear-gradient(180deg, rgba(6,14,29,.98), rgba(4,10,21,.98));
    }

    .eyebrow{
      display:inline-flex;
      align-items:center;
      min-height:42px;
      padding:0 16px;
      border-radius:999px;
      border:1px solid rgba(111,176,255,.2);
      background:rgba(98,154,255,.11);
      font-weight:700;
      margin-bottom:20px;
      color:#dce9ff;
    }

    h1{
      margin:0;
      font-size:clamp(3.1rem, 6vw, 6.2rem);
      line-height:.95;
      letter-spacing:-.08em;
      max-width:800px;
    }

    .lead{
      margin:22px 0 28px;
      max-width:760px;
      font-size:1.12rem;
      line-height:1.82;
      color:var(--muted);
    }

    .hero-actions{
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      margin-bottom:28px;
    }

    .stats{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:14px;
    }

    .stat{
      padding:18px;
      border-radius:20px;
      background:rgba(255,255,255,.028);
      border:1px solid rgba(113,171,255,.12);
      transition:.22s ease;
    }

    .stat:hover{
      transform:translateY(-4px);
      border-color:rgba(113,227,255,.24);
    }

    .stat strong{
      display:block;
      margin-bottom:6px;
      font-size:1.35rem;
    }

    .stat span{
      color:var(--muted);
      line-height:1.65;
      font-size:.95rem;
    }

    .hero-visual{
      min-height:730px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.01)),
        url('https://images.unsplash.com/photo-1521737604893-d14cc237f11d?auto=format&fit=crop&w=1600&q=80') center/cover no-repeat;
    }

    .consult-card{
      position:absolute;
      right:26px;
      top:28px;
      width:min(410px, calc(100% - 52px));
      padding:26px;
      border-radius:28px;
      background:rgba(18,25,40,.82);
      border:1px solid rgba(131,184,255,.2);
      backdrop-filter:blur(16px);
      box-shadow:0 20px 44px rgba(0,0,0,.28);
      z-index:2;
      animation:cardFloat 4.8s ease-in-out infinite;
    }

    @keyframes cardFloat{
      0%,100%{transform:translateY(0)}
      50%{transform:translateY(-6px)}
    }

    .consult-card h2{
      margin:0 0 10px;
      font-size:2rem;
      letter-spacing:-.05em;
    }

    .consult-card p{
      margin:0 0 16px;
      color:var(--muted);
      line-height:1.72;
    }

    .check-list{
      display:grid;
      gap:10px;
      margin-bottom:18px;
    }

    .check-list span{
      display:flex;
      align-items:center;
      gap:10px;
      line-height:1.5;
    }

    .check-list span::before{
      content:"✓";
      width:20px;
      height:20px;
      display:grid;
      place-items:center;
      border-radius:999px;
      font-size:.75rem;
      background:rgba(85,212,155,.16);
      color:#dbffea;
      flex:0 0 auto;
    }

    .section{
      padding:30px 0;
    }

    .section-head{
      display:flex;
      justify-content:space-between;
      align-items:end;
      gap:18px;
      margin-bottom:20px;
    }

    .section-head h2{
      margin:0;
      font-size:clamp(2.1rem, 4vw, 3.6rem);
      letter-spacing:-.06em;
    }

    .section-head p{
      margin:0;
      max-width:680px;
      color:var(--muted);
      line-height:1.75;
    }

    .showcase{
      display:grid;
      grid-template-columns:1.08fr .92fr;
      gap:20px;
      align-items:stretch;
    }

    .big-image{
      min-height:560px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02)),
        url('https://images.unsplash.com/photo-1521737604893-d14cc237f11d?auto=format&fit=crop&w=1600&q=80') center/cover no-repeat;
    }

    .overlay-copy{
      position:absolute;
      left:28px;
      right:28px;
      bottom:28px;
      z-index:2;
      padding:28px;
      border-radius:26px;
      background:rgba(8,18,34,.72);
      border:1px solid rgba(122,164,255,.18);
      backdrop-filter:blur(14px);
    }

    .overlay-copy h3{
      margin:0 0 10px;
      font-size:clamp(2rem, 4vw, 3.2rem);
      letter-spacing:-.06em;
      line-height:1.05;
    }

    .overlay-copy p{
      margin:0;
      color:var(--muted);
      line-height:1.75;
      font-size:1.05rem;
    }

    .mini-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:20px;
    }

    .image-tile{
      position:relative;
      min-height:270px;
      overflow:hidden;
      border-radius:30px;
      border:1px solid rgba(122,164,255,.12);
      box-shadow:var(--shadow);
      transition:transform .25s ease, border-color .25s ease, box-shadow .25s ease;
    }

    .image-tile:hover{
      transform:translateY(-6px);
      border-color:rgba(113,227,255,.24);
      box-shadow:0 24px 54px rgba(0,0,0,.34), 0 0 22px rgba(79,161,255,.12);
    }

    .image-tile img{
      width:100%;
      height:100%;
      object-fit:cover;
      transition:transform .6s ease;
    }

    .image-tile:hover img{
      transform:scale(1.05);
    }

    .image-label{
      position:absolute;
      left:18px;
      bottom:18px;
      z-index:2;
      padding:12px 16px;
      border-radius:999px;
      background:rgba(8,18,34,.74);
      border:1px solid rgba(122,164,255,.2);
      font-weight:800;
      font-size:1rem;
    }

    .cards-3{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:18px;
    }

    .card{
      padding:24px;
      border-radius:26px;
      background:linear-gradient(180deg, rgba(11,22,40,.92), rgba(7,14,28,.92));
      border:1px solid rgba(122,164,255,.12);
      box-shadow:var(--shadow);
      transition:.25s ease;
    }

    .card:hover{
      transform:translateY(-6px);
      border-color:rgba(113,227,255,.24);
    }

    .card h3{
      margin:0 0 10px;
      font-size:1.35rem;
      letter-spacing:-.03em;
    }

    .card p{
      margin:0;
      color:var(--muted);
      line-height:1.72;
    }

    .bundle-band{
      padding:24px;
      border-radius:26px;
      border:1px solid rgba(122,164,255,.14);
      background:linear-gradient(135deg, rgba(31,66,117,.36), rgba(10,24,44,.78));
      box-shadow:var(--shadow);
      display:grid;
      grid-template-columns:1.2fr .8fr;
      gap:20px;
      align-items:center;
    }

    .bundle-band h3{
      margin:0 0 10px;
      font-size:2rem;
      letter-spacing:-.05em;
    }

    .bundle-band p{
      margin:0;
      color:var(--muted);
      line-height:1.78;
    }

    .split{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:20px;
    }

    .steps{
      display:grid;
      gap:14px;
      margin-top:18px;
    }

    .step{
      display:grid;
      grid-template-columns:50px 1fr;
      gap:14px;
      align-items:start;
      padding:18px;
      border-radius:20px;
      background:rgba(255,255,255,.03);
      border:1px solid rgba(122,164,255,.12);
    }

    .step-num{
      width:50px;
      height:50px;
      display:grid;
      place-items:center;
      border-radius:16px;
      font-weight:900;
      background:linear-gradient(135deg, rgba(46,127,255,.24), rgba(90,214,255,.18));
    }

    .step strong{
      display:block;
      margin-bottom:6px;
    }

    .step p{
      margin:0;
      color:var(--muted);
      line-height:1.7;
    }

    .contact-boxes{
      display:grid;
      gap:14px;
      margin-top:18px;
    }

    .contact-box{
      padding:16px 18px;
      border-radius:18px;
      background:rgba(255,255,255,.03);
      border:1px solid rgba(122,164,255,.12);
    }

    .contact-box strong{
      display:block;
      margin-bottom:6px;
    }

    .inquiry{
      display:grid;
      grid-template-columns:.95fr 1.05fr;
      gap:20px;
      align-items:start;
    }

    form{
      display:grid;
      gap:14px;
    }

    .grid-2{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
    }

    input, select, textarea{
      width:100%;
      padding:15px 16px;
      border-radius:16px;
      border:1px solid rgba(122,164,255,.14);
      background:rgba(255,255,255,.03);
      color:var(--text);
      outline:none;
      transition:.2s ease;
    }

    input::placeholder, textarea::placeholder{
      color:#8da5c3;
    }

    input:focus, select:focus, textarea:focus{
      border-color:rgba(113,227,255,.6);
      box-shadow:0 0 0 4px rgba(113,227,255,.1);
      background:rgba(255,255,255,.05);
    }

    textarea{
      min-height:160px;
      resize:vertical;
    }

    .helper, .form-note{
      color:var(--muted);
      line-height:1.72;
    }

    .backup-box{
      margin-top:12px;
      padding:14px 16px;
      border-radius:16px;
      background:rgba(113,227,255,.06);
      border:1px dashed rgba(113,227,255,.24);
      color:#d9f7ff;
      line-height:1.65;
    }


    .form-status{
      display:none;
      margin-top:14px;
      padding:14px 16px;
      border-radius:16px;
      background:rgba(83,214,255,.09);
      border:1px solid rgba(113,227,255,.26);
      color:#dff9ff;
      line-height:1.65;
    }

    .form-status.show{
      display:block;
    }

    .form-status strong{
      display:block;
      margin-bottom:6px;
    }

    .faq{
      display:grid;
      gap:12px;
    }

    details{
      padding:18px;
      border-radius:18px;
      background:rgba(255,255,255,.03);
      border:1px solid rgba(122,164,255,.12);
    }

    summary{
      cursor:pointer;
      font-weight:800;
      list-style:none;
    }

    summary::-webkit-details-marker{display:none}
    details p{
      margin:12px 0 0;
      color:var(--muted);
      line-height:1.75;
    }

    footer{
      padding:30px 0 42px;
      color:#92a7c2;
    }

    .footer-wrap{
      display:flex;
      justify-content:space-between;
      gap:16px;
      flex-wrap:wrap;
      border-top:1px solid rgba(122,164,255,.12);
      padding-top:20px;
    }

    .reveal{
      opacity:0;
      transform:translateY(24px);
      transition:opacity .75s ease, transform .75s ease;
    }

    .reveal.show{
      opacity:1;
      transform:translateY(0);
    }

    .service-page{
      display:none;
      min-height:100vh;
    }

    .service-hero{
      padding:34px 0 16px;
    }

    .service-hero-grid{
      display:grid;
      grid-template-columns:1.04fr .96fr;
      gap:20px;
      align-items:stretch;
    }

    .service-copy{
      padding:48px 42px;
    }

    .service-copy h1{
      font-size:clamp(2.9rem, 5.5vw, 5.8rem);
      max-width:840px;
    }

    .service-copy p{
      color:var(--muted);
      line-height:1.84;
      font-size:1.08rem;
    }

    .service-image{
      min-height:640px;
      background-size:cover;
      background-position:center;
    }

    .metric-row{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:14px;
      margin-top:24px;
    }

    .metric{
      padding:18px;
      border-radius:20px;
      background:rgba(255,255,255,.03);
      border:1px solid rgba(122,164,255,.12);
    }

    .metric .num{
      font-size:2rem;
      font-weight:900;
      display:block;
      margin-bottom:6px;
    }

    .metric span:last-child{
      color:var(--muted);
      line-height:1.55;
      font-size:.95rem;
    }

    .service-sections{
      padding-bottom:24px;
    }

    .service-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:20px;
    }

    .pill-row{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-top:18px;
    }

    .pill{
      padding:10px 14px;
      border-radius:999px;
      background:rgba(255,255,255,.04);
      border:1px solid rgba(122,164,255,.12);
      color:#dce9ff;
      font-size:.92rem;
    }

    .back-link{
      display:inline-flex;
      align-items:center;
      gap:8px;
      margin-top:20px;
      color:var(--cyan);
      font-weight:800;
    }

    @media (max-width:1180px){
      .hero-grid, .showcase, .split, .inquiry, .cards-3, .service-hero-grid, .service-grid, .bundle-band{
        grid-template-columns:1fr;
      }
      .mini-grid{
        grid-template-columns:1fr 1fr;
      }
      .hero-visual{
        min-height:620px;
      }
      .consult-card{
        position:relative;
        top:auto;
        right:auto;
        width:calc(100% - 28px);
        margin:14px;
      }
    }

    @media (max-width:900px){
      .nav{
        padding:12px 0 16px;
        align-items:flex-start;
        flex-direction:column;
      }
      .stats, .grid-2, .metric-row, .mini-grid{
        grid-template-columns:1fr;
      }
      .hero-copy, .service-copy{
        padding:34px 24px 30px;
      }
      .section-head{
        flex-direction:column;
        align-items:start;
      }
      .brand-text strong{
        font-size:1.6rem;
      }
      .brand-logo,
      .brand-fallback{
        width:50px;
        height:50px;
      }
      .brand-logo-wrap{
        width:52px;
        height:52px;
      }
    }

    @media (max-width:640px){
      .container{
        width:min(var(--max), calc(100% - 16px));
      }
      .overlay-copy{
        left:16px;
        right:16px;
        bottom:16px;
        padding:20px;
      }
      .btn{
        min-height:50px;
        padding:0 18px;
      }
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    const services = {
      operations: {
        title: "Operational Support",
        short: "Operational structure that reduces friction, improves follow-through, and gives growing businesses a stronger execution layer.",
        eyebrow: "Operational support",
        heroImage: "https://images.unsplash.com/photo-1552664730-d307ca884978?auto=format&fit=crop&w=1600&q=80",
        tabImage: "https://images.unsplash.com/photo-1517048676732-d65bc937f952?auto=format&fit=crop&w=1600&q=80",
        homepageText: "We help businesses strengthen the daily operational layer that supports leadership, communication, admin execution, and consistent internal follow-through.",

          <section class="section" id="departments">

              <div class="panel card reveal">

                <h2 style="margin:0 0 10px;font-size:2.35rem;letter-spacing:-.05em;">This service can stand alone or be combined into a broader support model.</h2>

                <div class="contact-boxes">

          <section class="section" id="contact">

               <form id="inquiryForm" class="inquiry-form" action="https://formsubmit.co/contact@vertexops.net" method="POST" novalidate>
               <input type="hidden" name="_captcha" value="false">
<input type="hidden" name="_subject" value="New VertexOps Contact Message">
<input type="hidden" name="_template" value="table">
<input type="hidden" name="_autoresponse" value="Thank you for contacting VertexOps. Our team will respond shortly.">

    function renderPage(){
      const service = getQueryParam("service");
      const app = document.getElementById("app");
      app.innerHTML = service && services[service] ? buildServicePage(service) : buildHomePage();
      setupReveal();
      setupCounters();
      setupDraftSaver();
      setupFormSubmission();
    }

    function setupReveal(){
      const els = document.querySelectorAll(".reveal");
      if(!("IntersectionObserver" in window)){
        els.forEach(el => el.classList.add("show"));
        return;
      }
      const obs = new IntersectionObserver((entries)=>{
        entries.forEach(entry=>{
          if(entry.isIntersecting){
            entry.target.classList.add("show");
            obs.unobserve(entry.target);
          }
        });
      }, {threshold:.12});
      els.forEach(el=>obs.observe(el));
    }

    function setupCounters(){
      const counters = document.querySelectorAll(".counter");
      if(!counters.length) return;

      const animate = (el)=>{
        const target = Number(el.dataset.target || 0);
        const duration = 1400;
        const start = performance.now();
        function step(now){
          const progress = Math.min((now - start) / duration, 1);
          const eased = 1 - Math.pow(1 - progress, 3);
          el.textContent = Math.round(target * eased) + "%";
          if(progress < 1) requestAnimationFrame(step);
        }
        requestAnimationFrame(step);
      };

      if(!("IntersectionObserver" in window)){
        counters.forEach(animate);
        return;
      }

      const obs = new IntersectionObserver((entries)=>{
        entries.forEach(entry=>{
          if(entry.isIntersecting){
            animate(entry.target);
            obs.unobserve(entry.target);
          }
        });
      }, {threshold:.4});

      counters.forEach(c => obs.observe(c));
    }

    function setupDraftSaver(){
      const forms = document.querySelectorAll(".inquiry-form");
      if(!forms.length) return;

      forms.forEach((form, index)=>{
        const key = index === 0 ? "vertexops_inquiry_draft" : `vertexops_inquiry_draft_${index}`;
        const fields = [...form.querySelectorAll("input, textarea, select")];

        try{
          const saved = JSON.parse(localStorage.getItem(key) || "{}");
          fields.forEach(field=>{
            if(saved[field.name] && field.type !== "hidden" && saved[field.name]){
              field.value = saved[field.name];
            }
          });
        }catch(e){}

        const saveDraft = ()=>{
          const draft = {};
          fields.forEach(f=>{
            if(f.name && f.type !== "hidden") draft[f.name] = f.value;
          });
          localStorage.setItem(key, JSON.stringify(draft));
        };

        fields.forEach(field=>{
          field.addEventListener("input", saveDraft);
          field.addEventListener("change", saveDraft);
        });

        form.dataset.draftKey = key;
      });
    }

    function setupFormSubmission(){
      const forms = document.querySelectorAll(".inquiry-form");
      if(!forms.length) return;

      forms.forEach(form=>{
        form.addEventListener("submit", async (event)=>{
          ;

          if(!form.reportValidity()){
            return;
          }

          const action = form.getAttribute("action") || "";
          const statusBox = form.querySelector(".form-status");
          const submitButton = form.querySelector('button[type="submit"]');
          const draftKey = form.dataset.draftKey;

          if(draftKey){
            const backup = {};
            form.querySelectorAll("input, textarea, select").forEach(field=>{
              if(field.name && field.type !== "hidden") backup[field.name] = field.value;
            });
            localStorage.setItem(draftKey, JSON.stringify(backup));
          }

          if(!action || action.includes("your-form-id")){
            if(statusBox){
              statusBox.classList.add("show");
              statusBox.innerHTML = `
                 <strong>Form connected successfully.</strong>
  Your inquiry form is now connected to Formspree and ready to send.
`;
          
            }
            return;
          }

          const formData = new FormData(form);
          formData.append("_subject", formData.get("subject") || "VertexOps Inquiry");

          if(submitButton){
            submitButton.disabled = true;
            submitButton.textContent = "Sending...";
          }

          try {
  const response = await fetch(action, {
    method: "POST",
    body: formData,
    headers: { "Accept": "application/json" }
  });

  if (!response.ok) {
    throw new Error("Submission failed");
  }

  form.reset();
  if (draftKey) localStorage.removeItem(draftKey);

  if (statusBox) {
    statusBox.classList.add("show");
    statusBox.innerHTML = `
      <strong>Inquiry sent successfully.</strong>
      Thank you. Your message was submitted and we will get back to you soon.
    `;
  }
} catch (error) {
  if (statusBox) {
    statusBox.classList.add("show");
    statusBox.innerHTML = `
      <strong>Submission failed.</strong>
      Please try again in a moment or email contact@vertexops.net directly.
    `;
  }
}
            
          }finally{
            if(submitButton){
              submitButton.disabled = false;
              submitButton.textContent = "Send Inquiry";
            }
          }
        });
      });
    }

    renderPage();
  </script>
